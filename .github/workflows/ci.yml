name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: server (python 3.12 + uv)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        working-directory: server
        run: uv sync --all-extras --dev

      - name: Run unit tests
        working-directory: server
        run: uv run pytest -m unit

  node:
    name: agent (node 20 + pnpm)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: agent/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: agent
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        working-directory: agent
        run: pnpm vitest run
